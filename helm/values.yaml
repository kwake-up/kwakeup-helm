replicaCount: 1
image:
  repository: ghcr.io/kwake-up/kwakeup
  tag: "v1.0.9"
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
# ── Kubernetes workload scanning ─────────────────────────────────────────────
k8s:
  # exemptWorkloads is a list of glob patterns (path.Match syntax) matched
  # against bare workload names. Matching Deployments/StatefulSets are never
  # returned by the scanner and will not appear in resource groups.
  # The kwakeup deployment and built-in postgres StatefulSet are always added
  # automatically — no need to list them here.
  exemptWorkloads: []
  # Examples:
  # exemptWorkloads:
  #   - "kube-*"
  #   - "cert-manager"
# ── RBAC ─────────────────────────────────────────────────────────────────────
rbac:
  # Creates a ClusterRole and ClusterRoleBinding granting the kwakeup-scanner
  # group list/get access to Deployments and StatefulSets (and their scale
  # subresource). Required when kwakeup scans the cluster it is deployed in.
  # Set to false to manage RBAC externally or if this cluster is not scanned.
  # For remote EKS clusters, apply the same RBAC manually — see the README.
  create: true
# ── Service account ─────────────────────────────────────────────────────────
serviceAccount:
  create: true
  # Annotations added to the ServiceAccount — primary use-case is IRSA:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
  annotations: {}
  name: ""
# ── Pod configuration ────────────────────────────────────────────────────────
podAnnotations: {}
# prometheus.io/scrape: "true"
# prometheus.io/port: "8080"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534 # nobody
  fsGroup: 65534
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]
# ── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8080
# ── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  # - secretName: kwakeup-tls
  #   hosts:
  #     - chart-example.local
# ── Resource requests/limits ─────────────────────────────────────────────────
# No CPU limit intentionally — avoids throttling. Set one if your cluster
# enforces LimitRange policies.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
# ── Scheduling ───────────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}
# ── PodDisruptionBudget ──────────────────────────────────────────────────────
pdb:
  enabled: false
  minAvailable: 1
# ── Application configuration ────────────────────────────────────────────────
app:
  # HTTP listen address.
  httpAddr: ":8080"
  # Logging
  logLevel: info # trace | debug | info | warn | error
  logPretty: false # set true for human-readable console output in dev
  # Encryption key for secrets stored in the database (cloud account credentials).
  # Leave value empty to auto-generate a random key on first install.
  # Set existingSecret to skip Secret creation and reference a pre-existing Secret instead.
  encryptionKey:
    value: "" # REQUIRED unless existingSecret is set. Generate with: openssl rand -hex 32
    existingSecret: "" # set to use a pre-existing Secret instead of creating one
    secretKey: encryption-key
  # Session TTLs (Go duration strings: e.g. 30m, 8h, 24h).
  session:
    absoluteTTL: "24h"
    idleTTL: "30m"
  # CORS — set allowedOrigins to your frontend URL(s) in production.
  # Leaving allowedOrigins empty falls back to localhost defaults (dev only).
  cors:
    allowedOrigins: "" # e.g. "https://app.example.com" — REQUIRED in production
    allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
    maxAge: "12h"
  # Background resource scan
  scan:
    intervalMinutes: 30 # 0 disables the background scan
    minRetentionRatio: "0.80" # safety threshold: abort stale cleanup if scan looks truncated
  # Bootstrap admin — used only on the very first startup when the DB is empty.
  # Credentials are stored in a Secret; never set these in plaintext for production
  # — use existingSecret instead.
  bootstrapAdmin:
    email: "" # set to create the initial admin user
    password: "" # REQUIRED when email is set and existingSecret is not set
    existingSecret: ""
    secretKeys:
      email: bootstrap-admin-email
      password: bootstrap-admin-password
  # OIDC / SSO (optional) — all fields required when enabled.
  oidc:
    enabled: false
    issuer: "" # must be an https:// URL
    clientId: ""
    redirectUrl: "" # e.g. "https://app.example.com/auth/oidc/callback"
    groupsClaim: "groups"
    # clientSecret is stored in a Secret. Use existingSecret for production.
    clientSecret: ""
    existingSecret: ""
    secretKey: oidc-client-secret
  # SAML 2.0 (optional) — all fields required when enabled.
  saml:
    enabled: false
    idpMetadataUrl: "" # URL to the IdP metadata XML
    spEntityId: "" # Service Provider entity ID
    spAcsUrl: "" # Assertion Consumer Service URL
    # spCert and spKey are stored in a Secret. Use existingSecret for production.
    spCert: "" # PEM-encoded SP certificate
    spKey: "" # PEM-encoded SP private key
    existingSecret: ""
    secretKeys:
      cert: saml-sp-cert
      key: saml-sp-key
  # Freeform extra environment variables injected into the app container.
  env: {}
  # envFrom sources (ConfigMaps or Secrets) mounted wholesale.
  envFrom: []
  # - secretRef:
  #     name: my-app-secrets
# ── Database ──────────────────────────────────────────────────────────────────
# One of database.secretName or database.dsn is required — the chart fails
# to render without it.
database:
  # Recommended: reference a pre-existing Secret (key must contain the full DSN).
  secretName: ""
  secretKey: db_dsn
  # For local dev only — plaintext DSN injected directly as an env var.
  # Example: "host=db.example.com port=5432 user=kwakeup password=secret dbname=kwakeup sslmode=disable"
  dsn: ""
