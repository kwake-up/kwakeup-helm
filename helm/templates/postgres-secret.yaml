{{- if and .Values.postgres.enabled (not .Values.postgres.existingSecret) }}
{{- $secretName := printf "%s-postgres" (include "kwakeup.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := .Values.postgres.postgresPassword }}
{{- if not $password }}
  {{- if $existing }}
    {{- $password = index $existing.data "postgres-password" | b64dec }}
  {{- else }}
    {{- $password = randAlphaNum 24 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from overwriting the Secret on upgrade so the password is
    # not silently rotated while the StatefulSet still holds the old one.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-user: {{ .Values.postgres.postgresUser | quote }}
  postgres-password: {{ $password | quote }}
  postgres-db: {{ .Values.postgres.postgresDatabase | quote }}
  # Full DSN consumed by the app container via secretKeyRef so the password
  # never appears in plaintext in the Deployment spec.
  dsn: {{ printf "host=%s port=%d user=%s password=%s dbname=%s sslmode=disable"
    (printf "%s-postgres" (include "kwakeup.fullname" .))
    (int .Values.postgres.service.port)
    .Values.postgres.postgresUser
    $password
    .Values.postgres.postgresDatabase | quote }}
{{- end }}
