{{- if and .Values.postgres.enabled (not .Values.postgres.existingSecret) }}
{{- if not .Values.postgres.postgresPassword }}
{{- fail "postgres.postgresPassword is required when postgres.enabled=true and postgres.existingSecret is not set" }}
{{- end }}
{{- if not .Values.postgres.appPassword }}
{{- fail "postgres.appPassword is required when postgres.enabled=true and postgres.existingSecret is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-postgres" (include "kwakeup.fullname" .) }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-user: {{ .Values.postgres.postgresUser | quote }}
  postgres-password: {{ .Values.postgres.postgresPassword | quote }}
  postgres-db: {{ .Values.postgres.postgresDatabase | quote }}
  app-user: {{ .Values.postgres.appUser | quote }}
  app-password: {{ .Values.postgres.appPassword | quote }}
  dsn: {{ printf "host=%s port=%d user=%s password=%s dbname=%s sslmode=disable"
    (printf "%s-postgres" (include "kwakeup.fullname" .))
    (int .Values.postgres.service.port)
    .Values.postgres.appUser
    .Values.postgres.appPassword
    .Values.postgres.postgresDatabase | quote }}
{{- end }}
