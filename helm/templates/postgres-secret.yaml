{{- if and .Values.postgres.enabled (not .Values.postgres.existingSecret) }}
{{- $secretName := printf "%s-postgres" (include "kwakeup.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}

{{- $adminPassword := .Values.postgres.postgresPassword }}
{{- if not $adminPassword }}
  {{- if $existing }}
    {{- $adminPassword = index $existing.data "postgres-password" | b64dec }}
  {{- else }}
    {{- $adminPassword = randAlphaNum 24 }}
  {{- end }}
{{- end }}

{{- $appPassword := .Values.postgres.appPassword }}
{{- if not $appPassword }}
  {{- if $existing }}
    {{- $appPassword = index $existing.data "app-password" | b64dec }}
  {{- else }}
    {{- $appPassword = randAlphaNum 24 }}
  {{- end }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from overwriting the Secret on upgrade so passwords are
    # not silently rotated while the StatefulSet still holds the old ones.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-user: {{ .Values.postgres.postgresUser | quote }}
  postgres-password: {{ $adminPassword | quote }}
  postgres-db: {{ .Values.postgres.postgresDatabase | quote }}
  app-user: {{ .Values.postgres.appUser | quote }}
  app-password: {{ $appPassword | quote }}
  # DSN uses the unprivileged app user — the superuser credentials are never
  # handed to the application container.
  dsn: {{ printf "host=%s port=%d user=%s password=%s dbname=%s sslmode=disable"
    (printf "%s-postgres" (include "kwakeup.fullname" .))
    (int .Values.postgres.service.port)
    .Values.postgres.appUser
    $appPassword
    .Values.postgres.postgresDatabase | quote }}
{{- end }}
