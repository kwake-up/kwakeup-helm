{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kwakeup.serviceAccountName" . }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Do not auto-mount the service-account token — the app does not call the
# Kubernetes API directly. Enable per-pod if you add k8s provider support.
automountServiceAccountToken: false
{{- end }}
