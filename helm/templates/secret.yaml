{{/*
Encryption-key Secret — skipped when the operator supplies an existingSecret.
app.encryptionKey.value is required otherwise.
*/}}
{{- if not .Values.app.encryptionKey.existingSecret }}
{{- if not .Values.app.encryptionKey.value }}
{{- fail "app.encryptionKey.value is required when app.encryptionKey.existingSecret is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-encryption" (include "kwakeup.fullname" .) }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ .Values.app.encryptionKey.secretKey }}: {{ .Values.app.encryptionKey.value | quote }}
{{- end }}
---
{{/*
Bootstrap-admin Secret — created only when an email is configured and no
existingSecret is provided. Both email and password are required.
*/}}
{{- if and .Values.app.bootstrapAdmin.email (not .Values.app.bootstrapAdmin.existingSecret) }}
{{- if not .Values.app.bootstrapAdmin.password }}
{{- fail "app.bootstrapAdmin.password is required when app.bootstrapAdmin.email is set and app.bootstrapAdmin.existingSecret is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-bootstrap" (include "kwakeup.fullname" .) }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ .Values.app.bootstrapAdmin.secretKeys.email }}: {{ .Values.app.bootstrapAdmin.email | quote }}
  {{ .Values.app.bootstrapAdmin.secretKeys.password }}: {{ .Values.app.bootstrapAdmin.password | quote }}
{{- end }}
{{/*
OIDC client-secret Secret — created only when OIDC is enabled and the
clientSecret is provided directly (as opposed to via existingSecret).
*/}}
{{- if and .Values.app.oidc.enabled .Values.app.oidc.clientSecret (not .Values.app.oidc.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kwakeup.fullname" . }}-oidc
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.app.oidc.secretKey }}: {{ .Values.app.oidc.clientSecret | quote }}
{{- end }}
{{/*
SAML SP cert/key Secret — created only when SAML is enabled and credentials
are provided directly (as opposed to via existingSecret).
*/}}
{{- if and .Values.app.saml.enabled (not .Values.app.saml.existingSecret) }}
{{- if or .Values.app.saml.spCert .Values.app.saml.spKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kwakeup.fullname" . }}-saml
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.app.saml.secretKeys.cert }}: {{ .Values.app.saml.spCert | quote }}
  {{ .Values.app.saml.secretKeys.key }}: {{ .Values.app.saml.spKey | quote }}
{{- end }}
{{- end }}
