{{/*
Encryption-key Secret — auto-generated on first install, stable on upgrade.
lookup reads the existing Secret so the same key is reused across helm upgrades.
Skipped when the operator supplies an existingSecret.
*/}}
{{- if not .Values.app.encryptionKey.existingSecret }}
{{- $secretName := printf "%s-encryption" (include "kwakeup.fullname" .) }}
{{- $existing   := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
{{- if $existing }}
data:
  {{ .Values.app.encryptionKey.secretKey }}: {{ index $existing.data .Values.app.encryptionKey.secretKey }}
{{- else }}
stringData:
  {{ .Values.app.encryptionKey.secretKey }}: {{ .Values.app.encryptionKey.value | default (printf "%s%s" (uuidv4 | replace "-" "") (uuidv4 | replace "-" "")) | quote }}
{{- end }}
{{- end }}
---
{{/*
Bootstrap-admin Secret — created only when an email is configured and no
existingSecret is provided (i.e. the operator is not managing credentials
externally via Vault, ESO, etc.).
*/}}
{{- if and .Values.app.bootstrapAdmin.email (not .Values.app.bootstrapAdmin.existingSecret) }}
{{- $bootstrapSecretName := printf "%s-bootstrap" (include "kwakeup.fullname" .) }}
{{- $existingBootstrap   := lookup "v1" "Secret" .Release.Namespace $bootstrapSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $bootstrapSecretName }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
  annotations:
    # Helm will not overwrite this Secret on upgrade so the credentials are not
    # rotated unintentionally. Delete the Secret manually to reset them.
    helm.sh/resource-policy: keep
type: Opaque
{{- if $existingBootstrap }}
data:
  {{ .Values.app.bootstrapAdmin.secretKeys.email }}: {{ index $existingBootstrap.data .Values.app.bootstrapAdmin.secretKeys.email }}
  {{ .Values.app.bootstrapAdmin.secretKeys.password }}: {{ index $existingBootstrap.data .Values.app.bootstrapAdmin.secretKeys.password }}
{{- else }}
stringData:
  {{ .Values.app.bootstrapAdmin.secretKeys.email }}: {{ .Values.app.bootstrapAdmin.email | quote }}
  {{ .Values.app.bootstrapAdmin.secretKeys.password }}: {{ .Values.app.bootstrapAdmin.password | default (randAlphaNum 24) | quote }}
{{- end }}
{{- end }}
{{/*
OIDC client-secret Secret — created only when OIDC is enabled and the
clientSecret is provided directly (as opposed to via existingSecret).
*/}}
{{- if and .Values.app.oidc.enabled .Values.app.oidc.clientSecret (not .Values.app.oidc.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kwakeup.fullname" . }}-oidc
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.app.oidc.secretKey }}: {{ .Values.app.oidc.clientSecret | quote }}
{{- end }}
{{/*
SAML SP cert/key Secret — created only when SAML is enabled and credentials
are provided directly (as opposed to via existingSecret).
*/}}
{{- if and .Values.app.saml.enabled (not .Values.app.saml.existingSecret) }}
{{- if or .Values.app.saml.spCert .Values.app.saml.spKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kwakeup.fullname" . }}-saml
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.app.saml.secretKeys.cert }}: {{ .Values.app.saml.spCert | quote }}
  {{ .Values.app.saml.secretKeys.key }}: {{ .Values.app.saml.spKey | quote }}
{{- end }}
{{- end }}
