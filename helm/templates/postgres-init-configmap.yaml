{{- if and .Values.postgres.enabled (not .Values.postgres.existingSecret) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kwakeup.fullname" . }}-postgres-init
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
data:
  # Postgres runs all scripts in /docker-entrypoint-initdb.d/ once, on first
  # boot when the data directory is empty.  This script creates the app role
  # as a non-superuser and makes it the owner of the application database so
  # it can run migrations without any superuser privileges.
  init-app-user.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        CREATE USER "$APP_USER" WITH PASSWORD '$APP_PASSWORD';
        GRANT ALL PRIVILEGES ON DATABASE "$POSTGRES_DB" TO "$APP_USER";
        ALTER DATABASE "$POSTGRES_DB" OWNER TO "$APP_USER";
    EOSQL
{{- end }}
