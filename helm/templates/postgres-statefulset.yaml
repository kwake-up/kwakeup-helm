{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kwakeup.fullname" . }}-postgres
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "kwakeup.fullname" . }}-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kwakeup.fullname" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kwakeup.fullname" . }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Values.postgres.image.tag | quote }}
    spec:
      securityContext:
        {{- toYaml .Values.postgres.podSecurityContext | nindent 8 }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: {{ .Values.postgres.service.port }}
              name: postgres
              protocol: TCP
          {{- $pgSecretName := .Values.postgres.existingSecret | default (printf "%s-postgres" (include "kwakeup.fullname" .)) }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecretName }}
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecretName }}
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecretName }}
                  key: postgres-db
            # APP_USER / APP_PASSWORD are consumed by the init script only.
            # They are never used by the postgres process itself.
            - name: APP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecretName }}
                  key: app-user
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecretName }}
                  key: app-password
            # Use a subdirectory so Postgres does not refuse to init because
            # the parent mountpoint is non-empty (lost+found, etc.).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            {{- if not .Values.postgres.existingSecret }}
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      {{- $needsVolumes := or (not .Values.postgres.existingSecret) (not .Values.postgres.persistence.enabled) }}
      {{- if $needsVolumes }}
      volumes:
        {{- if not .Values.postgres.existingSecret }}
        - name: postgres-init
          configMap:
            name: {{ include "kwakeup.fullname" . }}-postgres-init
            defaultMode: 0755
        {{- end }}
        {{- if not .Values.postgres.persistence.enabled }}
        - name: postgres-data
          emptyDir: {}
        {{- end }}
      {{- end }}
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          {{- include "kwakeup.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.postgres.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
        {{- if .Values.postgres.persistence.storageClassName }}
        storageClassName: {{ .Values.postgres.persistence.storageClassName }}
        {{- end }}
  {{- end }}
{{- end }}
