apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kwakeup.fullname" . }}
  labels:
    {{- include "kwakeup.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kwakeup.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kwakeup.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kwakeup.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "kwakeup.fullname" . }}-postgres -p {{ .Values.postgres.service.port }}; do
                echo "waiting for postgres"; sleep 2
              done
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # ── Database ────────────────────────────────────────────────────
            - name: DB_DIALECT
              value: postgres
            - name: DB_DSN
            {{- if .Values.database.secretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: {{ .Values.database.secretKey }}
            {{- else if and .Values.postgres.enabled .Values.postgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: dsn
            {{- else if .Values.postgres.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "kwakeup.fullname" . }}-postgres
                  key: dsn
            {{- else }}
              value: {{ .Values.database.dsn | quote }}
            {{- end }}
            # ── Encryption ──────────────────────────────────────────────────
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kwakeup.encryptionKeySecretName" . }}
                  key: {{ .Values.app.encryptionKey.secretKey }}
            # ── Server ──────────────────────────────────────────────────────
            - name: HTTP_ADDR
              value: {{ .Values.app.httpAddr | quote }}
            # ── Logging ─────────────────────────────────────────────────────
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            - name: LOG_PRETTY
              value: {{ .Values.app.logPretty | quote }}
            # ── Session ─────────────────────────────────────────────────────
            - name: SESSION_ABSOLUTE_TTL
              value: {{ .Values.app.session.absoluteTTL | quote }}
            - name: SESSION_IDLE_TTL
              value: {{ .Values.app.session.idleTTL | quote }}
            # ── CORS ────────────────────────────────────────────────────────
            {{- $origins := .Values.app.cors.allowedOrigins }}
            {{- if and (not $origins) .Values.ingress.enabled .Values.ingress.hosts }}
              {{- /* Auto-derive from ingress hosts + localhost defaults. */}}
              {{- $list := list "http://localhost:3000" "http://localhost:5173" "http://localhost:8080" }}
              {{- range .Values.ingress.hosts }}
                {{- $host := .host }}
                {{- $scheme := "http" }}
                {{- range $.Values.ingress.tls }}
                  {{- if has $host .hosts }}{{- $scheme = "https" }}{{- end }}
                {{- end }}
                {{- $list = append $list (printf "%s://%s" $scheme $host) }}
              {{- end }}
              {{- $origins = $list | join "," }}
            {{- end }}
            {{- if $origins }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ $origins | quote }}
            {{- end }}
            - name: CORS_ALLOWED_METHODS
              value: {{ .Values.app.cors.allowedMethods | quote }}
            - name: CORS_MAX_AGE
              value: {{ .Values.app.cors.maxAge | quote }}
            # ── Scan ────────────────────────────────────────────────────────
            - name: SCAN_INTERVAL_MINUTES
              value: {{ .Values.app.scan.intervalMinutes | quote }}
            - name: SCAN_MIN_RETENTION_RATIO
              value: {{ .Values.app.scan.minRetentionRatio | quote }}
            # ── Kubernetes exempt workloads ──────────────────────────────────
            {{- $exempt := list (include "kwakeup.fullname" .) }}
            {{- if .Values.postgres.enabled }}
            {{- $exempt = append $exempt (printf "%s-postgres" (include "kwakeup.fullname" .)) }}
            {{- end }}
            {{- range .Values.k8s.exemptWorkloads }}
            {{- $exempt = append $exempt . }}
            {{- end }}
            - name: K8S_EXEMPT_WORKLOADS
              value: {{ join "," $exempt | quote }}
            # ── Bootstrap admin ─────────────────────────────────────────────
            {{- if .Values.app.bootstrapAdmin.email }}
            - name: BOOTSTRAP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kwakeup.bootstrapSecretName" . }}
                  key: {{ .Values.app.bootstrapAdmin.secretKeys.email }}
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kwakeup.bootstrapSecretName" . }}
                  key: {{ .Values.app.bootstrapAdmin.secretKeys.password }}
            {{- end }}
            # ── OIDC ────────────────────────────────────────────────────────
            {{- if .Values.app.oidc.enabled }}
            - name: OIDC_ISSUER
              value: {{ .Values.app.oidc.issuer | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.app.oidc.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kwakeup.oidcSecretName" . }}
                  key: {{ .Values.app.oidc.secretKey }}
            - name: OIDC_REDIRECT_URL
              value: {{ .Values.app.oidc.redirectUrl | quote }}
            - name: OIDC_GROUPS_CLAIM
              value: {{ .Values.app.oidc.groupsClaim | quote }}
            {{- end }}
            # ── SAML ────────────────────────────────────────────────────────
            {{- if .Values.app.saml.enabled }}
            - name: SAML_IDP_METADATA_URL
              value: {{ .Values.app.saml.idpMetadataUrl | quote }}
            - name: SAML_SP_ENTITY_ID
              value: {{ .Values.app.saml.spEntityId | quote }}
            - name: SAML_SP_ACS_URL
              value: {{ .Values.app.saml.spAcsUrl | quote }}
            - name: SAML_SP_CERT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kwakeup.samlSecretName" . }}
                  key: {{ .Values.app.saml.secretKeys.cert }}
            - name: SAML_SP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kwakeup.samlSecretName" . }}
                  key: {{ .Values.app.saml.secretKeys.key }}
            {{- end }}
            # ── Extra env vars ───────────────────────────────────────────────
            {{- range $key, $value := .Values.app.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.app.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
